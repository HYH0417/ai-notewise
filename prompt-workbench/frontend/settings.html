<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - Prompt 工程工作台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>提示词工程工作台</h1>
            <nav>
                <a href="/">仪表盘</a>
                <a href="/prompts">提示词列表</a>
                <a href="/prompt-edit">添加提示词</a>
                <a href="/favorites">我的收藏</a>
                <a href="/settings" class="active">设置</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">模型 API 配置</h2>
                <button class="btn btn-primary" onclick="openModelModal()">添加配置</button>
            </div>
            <div id="model-config-list"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">场景预设管理</h2>
            </div>
            <div id="scenario-list"></div>
        </div>
    </div>

    <div id="model-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="model-modal-title">添加模型配置</h2>
                <button class="modal-close" onclick="hideModal('model-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="model-form">
                    <input type="hidden" id="model-id">
                    
                    <div class="form-group">
                        <label>名称 *</label>
                        <input type="text" id="model-name" class="form-control" required placeholder="如：DeepSeek">
                    </div>
                    
                    <div class="form-group">
                        <label>API Base URL *</label>
                        <input type="text" id="model-api-base" class="form-control" required placeholder="如：https://api.deepseek.com/v1">
                    </div>
                    
                    <div class="form-group">
                        <label>API Key *</label>
                        <input type="password" id="model-api-key" class="form-control" required placeholder="输入 API Key">
                        <p style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">API Key 将加密存储</p>
                    </div>
                    
                    <div class="form-group">
                        <label>模型 ID *</label>
                        <input type="text" id="model-model-id" class="form-control" required placeholder="如：deepseek-chat">
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="model-is-default">
                            设置为默认配置
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideModal('model-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveModelConfig()">保存</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/settings.js"></script>
</body>
</html>
